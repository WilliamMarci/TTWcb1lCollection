treename: Events

selection:
   ### use `&`, `|`, `~` for logical operations on numpy arrays
   ### can use functions from `math`, `np` (numpy), and `awkward` in the expression
   (n_ak4>=4) & (n_b_ak4>=1) & (n_bc_loose>=3)

test_time_selection: (n_ak4>0)

new_variables:
   ### [format] name: formula
   ### can use functions from `math`, `np` (numpy), and `awkward` in the expression
   ttHcc: higgs_decay==4
   ttHbb: higgs_decay==5
   ttLF: (tt_category==0) & (higgs_decay==0)
   ttcc: (tt_category==4) & (higgs_decay==0)
   ttbb: (tt_category==5) & (higgs_decay==0)
   ak4_mask: ak.ones_like(ak4_pt)
   ak4p4: _p4_from_ptetaphim(ak4_pt, ak4_eta, ak4_phi, ak4_mass)
   ak4_px: ak4p4.px
   ak4_py: ak4p4.py
   ak4_pz: ak4p4.pz
   ak4_energy: ak4p4.energy
   ak4_deltaPhi: ak4_phi - ak4_phi[:, 0]
   ak4_pt_log: np.log(ak4_pt)
   ak4_energy_log: np.log(ak4_energy)
   # ak4_btag_L: ak4_pn_b > 0.05
   # ak4_btag_M: ak4_pn_b > 0.3
   # ak4_btag_T: ak4_pn_b > 0.8
   # ak4_ctag_L: ak4_pn_c > 0.1
   # ak4_ctag_M: ak4_pn_c > 0.2
   # ak4_ctag_T: ak4_pn_c > 0.5
   lep_pt: np.stack([lep1_pt, met], axis=1)
   lep_eta: np.stack([lep1_eta, met*0.], axis=1)
   lep_phi: np.stack([lep1_phi, met_phi], axis=1)
   lep_mass: np.stack([lep1_mass, met*0.], axis=1)
   lep_deltaPhi: ak.to_numpy(lep_phi) - ak.to_numpy(ak4_phi[:, 0])[:, None]
   lepp4: _p4_from_ptetaphim(lep_pt, lep_eta, lep_phi, lep_mass)
   lep_px: lepp4.px
   lep_py: lepp4.py
   lep_pz: lepp4.pz
   lep_energy: lepp4.energy
   lep_pt_log: np.log(lep_pt)
   lep_energy_log: np.log(lep_energy)
   lep_pdgId: np.abs(np.stack([lep1_pdgId, met*0.], axis=1))
   lep_isMu: lep_pdgId == 13
   lep_isEl: lep_pdgId == 11
   lep_mask: ak.ones_like(lep_pt)

preprocess:
   ### method: [manual, auto] - whether to use manually specified parameters for variable standardization
   method: manual
   ### data_fraction: fraction of events to use when calculating the mean/scale for the standardization
   data_fraction: 1

inputs:
   jet_points:
      length: 8
      pad_mode: wrap
      vars:
         - [ak4_eta, null]
         - [ak4_phi, null]
   jet_features:
      length: 8
      pad_mode: wrap
      vars:
         ### [format 1]: var_name (no transformation)
         ### [format 2]: [var_name,
         ###              subtract_by(optional, default=None, no transf. if preprocess.method=manual, auto transf. if preprocess.method=auto),
         ###              multiply_by(optional, default=1),
         ###              clip_min(optional, default=-5),
         ###              clip_max(optional, default=5),
         ###              pad_value(optional, default=0)]
         - [ak4_pt_log, 4, 1]
         - [ak4_energy_log, 4, 1]
         - [ak4_eta, null]
         - [ak4_deltaPhi, null]
         - [ak4_btag_L, null]
         - [ak4_btag_M, null]
         - [ak4_btag_T, null]
         - [ak4_ctag_L, null]
         - [ak4_ctag_M, null]
         - [ak4_ctag_T, null]
   jet_vectors:
      length: 8
      pad_mode: wrap
      vars:
         - [ak4_px, null]
         - [ak4_py, null]
         - [ak4_pz, null]
         - [ak4_energy, null]
   jet_mask:
      length: 8
      pad_mode: constant
      vars:
         - [ak4_mask, null]
   lep_points:
      length: 2
      vars:
         - [lep_eta, null]
         - [lep_phi, null]
   lep_features:
      length: 2
      vars:
         - [lep_pt_log, 4, 1]
         - [lep_energy_log, 4, 1]
         - [lep_eta, null]
         - [lep_deltaPhi, null]
         - [lep_isMu, null]
         - [lep_isEl, null]
   lep_vectors:
      length: 2
      vars:
         - [lep_px, null]
         - [lep_py, null]
         - [lep_pz, null]
         - [lep_energy, null]
   lep_mask:
      length: 2
      vars:
         - [lep_mask, null]

labels:
   ### type can be `simple`, `custom`
   ### [option 1] use `simple` for binary/multi-class classification, then `value` is a list of 0-1 labels
   type: simple
   value: [ttHcc, ttHbb, ttLF, ttcc, ttbb]
   ### [option 2] otherwise use `custom` to define the label, then `value` is a map
   # type: custom
   # value:
   # target_mass: np.where(fj_isQCD, fj_genjet_sdmass, fj_gen_mass)

observers:
   - run
   - luminosityBlock
   - event

weights:
   ### [option 1] use precomputed weights stored in the input files
   # use_precomputed_weights: true
   # weight_branches: [weight, class_weight]
   ### [option 2] compute weights on-the-fly using reweighting histograms
   use_precomputed_weights: false
   reweight_basewgt: genWeight*xsecWeight
   reweight_method: flat
   reweight_vars:
      lep1_eta: [-10000, 10000]
      lep1_phi: [-10000, 10000]
   reweight_classes: [ttHcc, ttHbb, ttLF, ttcc, ttbb]
   class_weights: [1, 1, 1, 1, 1]
   reweight_hists:
