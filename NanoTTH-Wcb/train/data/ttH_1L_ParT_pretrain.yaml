treename: Events

selection:
   ### use `&`, `|`, `~` for logical operations on numpy arrays
   ### can use functions from `math`, `np` (numpy), and `awkward` in the expression
   (n_ak4>=4) & (n_btag>=1) & (n_btag+n_ctag>=3)

test_time_selection: (n_ak4>0)

new_variables:
   ### [format] name: formula
   ### can use functions from `math`, `np` (numpy), and `awkward` in the expression
   ttHcc: higgs_decay==4
   ttHbb: higgs_decay==5
   ttZqq: (z_decay>=1) & (z_decay<=3)
   ttZcc: z_decay==4
   ttZbb: z_decay==5
   ttLF: (tt_category==0) & (higgs_decay==0) & (z_decay==0)
   ttcj: ((genEventClassifier>=4) & (genEventClassifier<=5)) & (higgs_decay==0) & (z_decay==0)
   ttcc: (genEventClassifier==6) & (higgs_decay==0) & (z_decay==0)
   ttbj: ((genEventClassifier>=7) & (genEventClassifier<=8)) & (higgs_decay==0) & (z_decay==0)
   ttbb: (genEventClassifier==9) & (higgs_decay==0) & (z_decay==0)
   ak4_mask: ak.ones_like(ak4_pt)
   ak4p4: _p4_from_ptetaphim(ak4_pt, ak4_eta, ak4_phi, ak4_mass)
   ak4_px: ak4p4.px
   ak4_py: ak4p4.py
   ak4_pz: ak4p4.pz
   ak4_energy: ak4p4.energy
   ak4_pt_log: np.log(ak4_pt)
   ak4_energy_log: np.log(ak4_energy)
   ak4_tag_B4: ak4_tag == 54
   ak4_tag_B3: ak4_tag == 53
   ak4_tag_B2: ak4_tag == 52
   ak4_tag_B1: ak4_tag == 51
   ak4_tag_B0: ak4_tag == 50
   ak4_tag_C4: ak4_tag == 44
   ak4_tag_C3: ak4_tag == 43
   ak4_tag_C2: ak4_tag == 42
   ak4_tag_C1: ak4_tag == 41
   ak4_tag_C0: ak4_tag == 40
   lep_pt: np.stack([lep1_pt, met], axis=1)
   lep_eta: np.stack([lep1_eta, met*0.], axis=1)
   lep_phi: np.stack([lep1_phi, met_phi], axis=1)
   lep_mass: np.stack([lep1_mass, met*0.], axis=1)
   lepp4: _p4_from_ptetaphim(lep_pt, lep_eta, lep_phi, lep_mass)
   lep_px: lepp4.px
   lep_py: lepp4.py
   lep_pz: lepp4.pz
   lep_energy: lepp4.energy
   lep_pt_log: np.log(lep_pt)
   lep_energy_log: np.log(lep_energy)
   lep_pdgId: np.abs(np.stack([lep1_pdgId, met*0.], axis=1))
   lep_isMu: lep_pdgId == 13
   lep_isEl: lep_pdgId == 11
   lep_mask: ak.ones_like(lep_pt)

preprocess:
   ### method: [manual, auto] - whether to use manually specified parameters for variable standardization
   method: manual
   ### data_fraction: fraction of events to use when calculating the mean/scale for the standardization
   data_fraction: 1

inputs:
   jet_features:
      length: 8
      pad_mode: wrap
      vars:
         ### [format 1]: var_name (no transformation)
         ### [format 2]: [var_name,
         ###              subtract_by(optional, default=None, no transf. if preprocess.method=manual, auto transf. if preprocess.method=auto),
         ###              multiply_by(optional, default=1),
         ###              clip_min(optional, default=-5),
         ###              clip_max(optional, default=5),
         ###              pad_value(optional, default=0)]
         - [ak4_pt_log, 4, 1]
         - [ak4_energy_log, 4, 1]
         - [ak4_eta, null]
         - [ak4_tag_B4, null]
         - [ak4_tag_B3, null]
         - [ak4_tag_B2, null]
         - [ak4_tag_B1, null]
         - [ak4_tag_B0, null]
         - [ak4_tag_C4, null]
         - [ak4_tag_C3, null]
         - [ak4_tag_C2, null]
         - [ak4_tag_C1, null]
         - [ak4_tag_C0, null]
   jet_vectors:
      length: 8
      pad_mode: wrap
      vars:
         - [ak4_px, null]
         - [ak4_py, null]
         - [ak4_pz, null]
         - [ak4_energy, null]
   jet_mask:
      length: 8
      pad_mode: constant
      vars:
         - [ak4_mask, null]
   lep_features:
      length: 2
      vars:
         - [lep_pt_log, 4, 1]
         - [lep_energy_log, 4, 1]
         - [lep_eta, null]
         - [lep_isMu, null]
         - [lep_isEl, null]
   lep_vectors:
      length: 2
      vars:
         - [lep_px, null]
         - [lep_py, null]
         - [lep_pz, null]
         - [lep_energy, null]
   lep_mask:
      length: 2
      vars:
         - [lep_mask, null]

labels:
   ### type can be `simple`, `custom`
   ### [option 1] use `simple` for binary/multi-class classification, then `value` is a list of 0-1 labels
   type: simple
   value: [ttHcc, ttHbb, ttZqq, ttZcc, ttZbb, ttLF, ttcj, ttcc, ttbj, ttbb]
   ### [option 2] otherwise use `custom` to define the label, then `value` is a map
   # type: custom
   # value:
   # target_mass: np.where(fj_isQCD, fj_genjet_sdmass, fj_gen_mass)

observers:
   - run
   - luminosityBlock
   - event

weights:
